<body>
    <div class="container">
        <div id="welcome-screen">
            <h1>🧭 Orienteering</h1>
            <p class="subtitle">Fyling Hall School</p>
            
            <div class="form-group">
                <label>House</label>
                <select id="house">
                    <option value="">-- Select your house --</option>
                    <option value="Red">Red</option>
                    <option value="Blue">Blue</option>
                </select>
            </div>

            <div class="form-group">
                <label>Team Name</label>
                <input type="text" id="teamName" placeholder="e.g., Team A">
            </div>

            <div class="form-group">
                <label>Course Difficulty</label>
                <select id="course">
                    <option value="">-- Select course --</option>
                    <option value="easy">Easy (5 checkpoints)</option>
                    <option value="medium">Medium (8 checkpoints)</option>
                    <option value="hard">Hard (12 checkpoints)</option>
                </select>
            </div>

            <button onclick="startCourse()">Start Course</button>
        </div>

        <div id="course-screen" class="hidden">
            <h1 id="courseTitle">Easy Course</h1>
            <div class="timer" id="timer">00:00</div>

            <div class="checkpoints" id="checkpoints"></div>

            <div class="qr-section">
                <h2 style="font-size: 18px; margin-bottom: 10px;">Scan QR Code</h2>
                <div class="qr-scanner">
                    <div id="scanner"></div>
                    <div class="qr-fallback" id="scannerFallback" style="width: 100%;">
                        <p>📱 Point camera at QR code</p>
                        <p style="font-size: 12px; margin-top: 10px; color: #ccc;">or enter checkpoint code below</p>
                    </div>
                </div>

                <input type="text" id="qrInput" placeholder="QR Code (auto-scanned)" autocomplete="off">
                <button onclick="scanCheckpoint()">Scan Checkpoint</button>
                <button class="secondary" onclick="finishCourse()">Finish Course</button>
                <button class="danger" onclick="abandonCourse()">Abandon</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.4/html5-qrcode.min.js"></script>
    <script>
        // Disable pull-to-refresh on mobile
        document.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) return;
            const touch = e.touches[0];
            if (window.scrollY === 0 && touch.clientY > 0) {
                e.preventDefault();
            }
        }, { passive: false });

        let currentTeam = null;
        let currentCourse = null;
        let startTime = null;
        let timerInterval = null;
        let scannedCheckpoints = new Set();
        let html5QrCode = null;

        function getCourseCheckpoints(course) {
            const checkpoints = {
                easy: ['CP1', 'CP2', 'CP3', 'CP4', 'CP5'],
                medium: ['CP1', 'CP2', 'CP3', 'CP4', 'CP5', 'CP6', 'CP7', 'CP8'],
                hard: ['CP1', 'CP2', 'CP3', 'CP4', 'CP5', 'CP6', 'CP7', 'CP8', 'CP9', 'CP10', 'CP11', 'CP12']
            };
            return checkpoints[course] || [];
        }

        function startCourse() {
            const house = document.getElementById('house').value;
            const teamName = document.getElementById('teamName').value;
            const course = document.getElementById('course').value;

            if (!house || !teamName || !course) {
                alert('Please select a house, enter a team name, and choose a course.');
                return;
            }

            currentTeam = { house, name: teamName, course };
            currentCourse = course;
            startTime = Date.now();
            scannedCheckpoints.clear();

            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('course-screen').classList.remove('hidden');
            document.getElementById('courseTitle').textContent = 
                course.charAt(0).toUpperCase() + course.slice(1) + ' Course';

            renderCheckpoints();
            startTimer();
            startQRScanner();
        }

        function renderCheckpoints() {
            const checkpoints = getCourseCheckpoints(currentCourse);
            const container = document.getElementById('checkpoints');
            container.innerHTML = checkpoints.map(cp => `
                <div class="checkpoint ${scannedCheckpoints.has(cp) ? 'completed' : ''}">
                    <span class="checkpoint-name">${cp}</span>
                    <div class="checkpoint-status">${scannedCheckpoints.has(cp) ? '✓' : '○'}</div>
                </div>
            `).join('');
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                document.getElementById('timer').textContent = 
                    String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            }, 100);
        }

        function startQRScanner() {
            try {
                html5QrCode = new Html5Qrcode("scanner");
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: 250 },
                    onScanSuccess,
                    onScanFailure
                ).catch(err => {
                    console.log("QR scanner init error:", err);
                    document.getElementById('scannerFallback').style.display = 'block';
                });
            } catch (err) {
                console.log("QR scanner error:", err);
                document.getElementById('scannerFallback').style.display = 'block';
            }
        }

        function onScanSuccess(decodedText) {
            document.getElementById('qrInput').value = decodedText;
            scanCheckpoint();
        }

        function onScanFailure(error) {
            // Silent - allow fallback text entry
        }

        function scanCheckpoint() {
            const code = document.getElementById('qrInput').value.trim().toUpperCase();
            const checkpoints = getCourseCheckpoints(currentCourse);

            if (!code) {
                alert('Please enter or scan a checkpoint code.');
                return;
            }

            if (!checkpoints.includes(code)) {
                alert('Invalid checkpoint code for this course.');
                document.getElementById('qrInput').value = '';
                return;
            }

            if (scannedCheckpoints.has(code)) {
                alert('Already scanned this checkpoint!');
                return;
            }

            scannedCheckpoints.add(code);
            document.getElementById('qrInput').value = '';
            renderCheckpoints();

            if (scannedCheckpoints.size === checkpoints.length) {
                finishCourse();
            }
        }

        function finishCourse() {
            clearInterval(timerInterval);
            if (html5QrCode) {
                html5QrCode.stop().catch(() => {});
            }

            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const checkpoints = getCourseCheckpoints(currentCourse);
            const completed = scannedCheckpoints.size === checkpoints.length;

            const result = {
                team: currentTeam.name,
                house: currentTeam.house,
                course: currentCourse,
                time: elapsed,
                checkpointsScanned: scannedCheckpoints.size,
                totalCheckpoints: checkpoints.length,
                completed: completed,
                timestamp: new Date().toISOString()
            };

            localStorage.setItem('lastResult', JSON.stringify(result));

            // Save to backend
            fetch('/api/results', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(result)
            }).catch(() => {});

            alert(`Course finished!\n${currentTeam.name}: ${Math.floor(elapsed/60)}m ${elapsed%60}s\nCheckpoints: ${scannedCheckpoints.size}/${checkpoints.length}`);
            location.reload();
        }

        function abandonCourse() {
            if (confirm('Are you sure you want to abandon this course?')) {
                clearInterval(timerInterval);
                if (html5QrCode) {
                    html5QrCode.stop().catch(() => {});
                }
                location.reload();
            }
        }
    </script>
</body>
</html>
